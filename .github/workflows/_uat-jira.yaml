name: Notifications and JIRA

on:
  workflow_call:
    inputs:
      git-tag:
        required: true
        description: Version Tag
        type: string
    secrets:
      devops-repo-key:
        required: true
      jira-webhook-secret:
        required: true
      github-pat:
        required: true
      jira-webhook-url:
        required: true


jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devops
        uses: actions/checkout@v6
        with:
          repository: ChildMindInstitute/cmiml-devops
          ssh-key: ${{ secrets.devops-repo-key }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Send notifications
        env:
          GITHUB_REPO: ${{ github.repository }}
          JIRA_SECRET: ${{ secrets.jira-webhook-secret }}
          JIRA_WEBHOOK: ${{ secrets.jira-webhook-url }}
          GITHUB_TOKEN: ${{ secrets.github-pat }}
        run: |
          sudo apt install -y expect
          unbuffer uv run uat-notify.py ${{ inputs.git-tag }}
        working-directory: ./jira

